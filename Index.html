<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .task-row { transition: all 0.2s ease; border-bottom: 1px solid rgba(200, 210, 230, 0.5); }
        .task-row:hover { background-color: rgba(112, 143, 236, 0.12); box-shadow: inset 0 0 0 1px rgba(112, 143, 236, 0.1); }
        .status-badge {
            padding: 0.35rem 0.85rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .status-todo { background-color: #FFE5E5; color: #C41C3B; }
        .status-inprogress { background-color: #FFF4E6; color: #E67E22; }
        .status-done { background-color: #E8F8F5; color: #27AE60; }
        .priority-high { color: #E74C3C; font-weight: 700; }
        .priority-medium { color: #E67E22; font-weight: 700; }
        .priority-low { color: #3498DB; font-weight: 700; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-slate-100">
    <div id="app"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function FinanceTaskTracker() {
            const [expandedId, setExpandedId] = useState(null);
            const [editingNoteId, setEditingNoteId] = useState(null);
            const [editingNoteText, setEditingNoteText] = useState("");
            const [showAddModal, setShowAddModal] = useState(false);
            const [entities, setEntities] = useState([]);
            const [newEntity, setNewEntity] = useState("");
            const [tasks, setTasks] = useState([
                { id: 1, name: "KPRA Registration / Notice for Audit", entity: "", status: "Pending", dueDate: "2024-12-08", priority: "Medium", notes: ["Dated in Office."] },
                { id: 2, name: "Alif College New Block Construction", entity: "", status: "Pending", dueDate: "2025-07-31", priority: "Medium", notes: ["Regular Follow up on Mehran sb and Ms. Mehr.", "MD sb team is looking after the construction."] },
                { id: 3, name: "G-14 Plot Hospital Proposal", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Hospital / Life Style.", "Project is on hold"] },
                { id: 4, name: "Guest Houses Feasibility", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Meeting with Ansar Sb for Guesthouses."] },
                { id: 5, name: "Green Valley Road Development", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Further action after getting Road access/ Road expansion.", "Meeting with Chief commissioner is to be scheduled."] },
                { id: 6, name: "PC Back side area development", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Feasibility to be prepared based on Mr. Martins plan.", "List has been prepared.", "Important items are in process."] },
                { id: 7, name: "GTPL Hotel Properties", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["First cut Feasibility is ready has been shared.", "Hasan Sb is visiting all properties.", "Letter of Intent has also been shared with GTPL."] },
                { id: 8, name: "Samsons Research on International Resorts", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: [] },
                { id: 9, name: "Blossoms 2nd Branch", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Mehran sb is looking after the availability on CDA Side."] },
                { id: 10, name: "MJ downwards revised cost structure", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["To be implemented from 22 Feb 2026.", "Draft for approval to be shared on 25 Jan 2026."] },
                { id: 11, name: "Closure of Extra Trade Licenses", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: [] },
                { id: 12, name: "Invoices Back Log", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Status updated and volume of backlog from Tahir."] },
                { id: 13, name: "F6 Office Seating Plan", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Sent to Mansoor sb for approval.", "Financial impact approx 5 million."] },
                { id: 14, name: "Security Manager Salary Approval", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Approval for Salary of Maj. Iqbal (Advance Paid)."] },
                { id: 15, name: "Agri Financials", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Abid sb has shared numbers.", "Requested Shahid Sb for Presentation."] },
                { id: 16, name: "Possibility of IBKR account for SGT", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["We have discussed with multiple sources and understand that we can go ahead."] },
                { id: 17, name: "Dubai Increments", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Tahir and team are expecting increment.", "Last was given 2 years back."] },
                { id: 18, name: "Funds Position Apr-Jun 2026", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["3 Months Funds Position with recent Payouts."] },
                { id: 19, name: "Dashboard For Blue Area", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["KPI / Matrix to be listed for Blue Area Projects."] },
                { id: 20, name: "Finance Calendar", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Closing Calendar for all units to be shared."] },
                { id: 21, name: "Mr. Martin Data collection and pricing correlation", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Need to evaluate Mr. Martins data collection and its pricing co-relation."] },
                { id: 22, name: "Shifting Cost of DHQ Pharmacy", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Asked Fazle Hadi to get estimate from both Mr. Waseem and Mr. Nadeem."] },
                { id: 23, name: "Dialysis Machine Addition", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Feasibility for Dialysis Machine and List of patients refused due to screening."] },
                { id: 24, name: "MJ Drawings Status", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Detail of drawings so far from MJ."] },
                { id: 25, name: "Cash Flow forecast for 3 Years", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: ["Cash flow projection for next 3 years including Blue Area project."] }
            ]);
            const [newTask, setNewTask] = useState({ name: "", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: [] });
            const [nextId, setNextId] = useState(26);
            const [editingCell, setEditingCell] = useState(null);
            const [editingValue, setEditingValue] = useState("");
            const [filterStatus, setFilterStatus] = useState("All");
            const [sortBy, setSortBy] = useState("dueDate");
            const [sortOrder, setSortOrder] = useState("desc");

            const addTask = () => {
                if (newTask.name.trim() === "") {
                    alert("Please fill in Task Name");
                    return;
                }
                const task = { ...newTask, id: nextId, notes: newTask.notes.filter(n => n.trim()) };
                setTasks([...tasks, task]);
                setNextId(nextId + 1);
                setNewTask({ name: "", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: [] });
                setShowAddModal(false);
            };

            const addEntity = () => {
                if (newEntity.trim() && !entities.includes(newEntity.trim())) {
                    setEntities([...entities, newEntity.trim()]);
                    setNewEntity("");
                }
            };

            const addNote = (taskId, noteText) => {
                if (!noteText.trim()) return;
                setTasks(tasks.map(t => t.id === taskId ? { ...t, notes: [...t.notes, noteText] } : t));
            };

            const editNote = (taskId, noteIndex, newText) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, notes: t.notes.map((n, i) => i === noteIndex ? newText : n) } : t));
            };

            const deleteNote = (taskId, noteIndex) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, notes: t.notes.filter((_, i) => i !== noteIndex) } : t));
            };

            const cycleStatus = (taskId) => {
                const statusCycle = ["Pending", "Complete"];
                setTasks(tasks.map(t => {
                    if (t.id === taskId) {
                        const currentIdx = statusCycle.indexOf(t.status);
                        const nextIdx = (currentIdx + 1) % statusCycle.length;
                        return { ...t, status: statusCycle[nextIdx] };
                    }
                    return t;
                }));
            };

            const cyclePriority = (taskId) => {
                const priorityCycle = ["Low", "Medium", "High"];
                setTasks(tasks.map(t => {
                    if (t.id === taskId) {
                        const currentIdx = priorityCycle.indexOf(t.priority);
                        const nextIdx = (currentIdx + 1) % priorityCycle.length;
                        return { ...t, priority: priorityCycle[nextIdx] };
                    }
                    return t;
                }));
            };

            const deleteTask = (id) => {
                if (confirm("Are you sure you want to delete this task?")) {
                    setTasks(tasks.filter(t => t.id !== id));
                }
            };

            const updateTaskField = (taskId, field, value) => {
                setTasks(tasks.map(t => t.id === taskId ? {...t, [field]: value} : t));
                setEditingCell(null);
            };

            const exportJSON = () => {
                const dataStr = JSON.stringify(tasks, null, 2);
                const dataBlob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `Finance_Tasks_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
            };

            const exportCSV = () => {
                let csv = "Task ID,Task Name,Entity,Status,Due Date,Priority,Notes\n";
                tasks.forEach(task => {
                    csv += `${task.id},"${task.name}","${task.entity}","${task.status}","${task.dueDate}","${task.priority}","${task.notes}"\n`;
                });
                const blob = new Blob([csv], { type: "text/csv" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `Finance_Tasks_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

            const importJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            setTasks(imported);
                            const maxId = Math.max(...imported.map(t => t.id), 0);
                            setNextId(maxId + 1);
                            alert("Tasks imported successfully!");
                        }
                    } catch (err) {
                        alert("Error importing file. Please ensure it's a valid JSON file.");
                    }
                };
                reader.readAsText(file);
                e.target.value = "";
            };

            const filteredTasks = (filterStatus === "All" ? tasks : tasks.filter(t => t.status === filterStatus)).sort((a, b) => {
                if (a.status === "Complete" && b.status !== "Complete") return 1;
                if (a.status !== "Complete" && b.status === "Complete") return -1;

                let compareA = a[sortBy];
                let compareB = b[sortBy];

                if (sortBy === "dueDate") {
                    compareA = new Date(compareA || "9999-12-31");
                    compareB = new Date(compareB || "9999-12-31");
                    const result = compareB - compareA;
                    return sortOrder === "asc" ? -result : result;
                } else if (sortBy === "priority") {
                    const priorityOrder = { "High": 3, "Medium": 2, "Low": 1 };
                    const result = (priorityOrder[compareB] || 0) - (priorityOrder[compareA] || 0);
                    return sortOrder === "asc" ? -result : result;
                } else {
                    compareA = String(compareA || "").toLowerCase();
                    compareB = String(compareB || "").toLowerCase();
                    const result = compareA.localeCompare(compareB);
                    return sortOrder === "asc" ? result : -result;
                }
            });

            const getPriorityBgClass = (priority) => {
                if (priority === "High") return "bg-red-50";
                if (priority === "Medium") return "bg-yellow-50";
                return "bg-blue-50";
            };

            const getStatusClass = (status) => {
                if (status === "Pending") return "status-todo";
                return "status-done";
            };

            const getPriorityClass = (priority) => {
                if (priority === "High") return "priority-high";
                if (priority === "Medium") return "priority-medium";
                return "priority-low";
            };

            const handleHeaderClick = (column) => {
                if (sortBy === column) {
                    setSortOrder(sortOrder === "asc" ? "desc" : "asc");
                } else {
                    setSortBy(column);
                    setSortOrder("asc");
                }
            };

            return (
                <div class="min-h-screen p-8" style={{background: 'linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)'}}>
                    <div class="max-w-7xl mx-auto">
                        {/* Header */}
                        <div class="mb-6 pt-8 flex justify-between items-start">
                            <h1 class="text-6xl font-bold text-gray-900" style={{letterSpacing: '-0.5px'}}>TASK TRACKER - FINANCE</h1>
                            <button
                                onClick={() => setShowAddModal(true)}
                                class="text-white font-semibold py-3 px-6 rounded-lg transition text-sm shadow-md hover:shadow-lg"
                                style={{backgroundColor: '#708fec'}}
                                onMouseEnter={(e) => e.target.style.backgroundColor = '#5A6FD8'}
                                onMouseLeave={(e) => e.target.style.backgroundColor = '#708fec'}
                            >
                                + Add New Task
                            </button>
                        </div>

                        {/* Dashboard */}
                        <div class="mb-6 grid grid-cols-3 gap-6">
                            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 hover:shadow-md transition-shadow" style={{borderLeft: '4px solid #708fec'}}>
                                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Total Tasks</p>
                                <p class="text-3xl font-bold text-gray-900">{tasks.length}</p>
                            </div>
                            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 hover:shadow-md transition-shadow" style={{borderLeft: '4px solid #F39C12'}}>
                                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Pending</p>
                                <p class="text-3xl font-bold" style={{color: '#F39C12'}}>{tasks.filter(t => t.status === "Pending").length}</p>
                            </div>
                            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 hover:shadow-md transition-shadow" style={{borderLeft: '4px solid #27AE60'}}>
                                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Completed</p>
                                <p class="text-3xl font-bold" style={{color: '#27AE60'}}>{tasks.filter(t => t.status === "Complete").length}</p>
                            </div>
                        </div>

                        {/* Add Task Modal */}
                        {showAddModal && (
                            <div class="fixed inset-0 bg-black bg-opacity-25 flex items-center justify-center z-50 p-4" style={{backdropFilter: 'blur(4px)'}}>
                                <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-2xl w-full max-h-96 overflow-y-auto border border-gray-100">
                                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Add New Task</h2>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <input
                                            type="text"
                                            placeholder="Task Name"
                                            value={newTask.name}
                                            onChange={(e) => setNewTask({...newTask, name: e.target.value})}
                                            class="px-4 py-2 border border-gray-300 rounded-lg bg-white text-gray-800 placeholder-gray-500" style={{boxShadow: '0 0 0 0 rgba(112, 143, 236, 0)'}} onFocus={(e) => e.target.style.boxShadow = '0 0 0 2px rgba(112, 143, 236, 0.5)'} onBlur={(e) => e.target.style.boxShadow = '0 0 0 0 rgba(112, 143, 236, 0)'}
                                        />
                                        <div class="flex gap-2">
                                            <select
                                                value={newTask.entity}
                                                onChange={(e) => setNewTask({...newTask, entity: e.target.value})}
                                                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 bg-white text-gray-800"
                                            >
                                                <option value="">Select Entity</option>
                                                {entities.map(ent => <option key={ent}>{ent}</option>)}
                                            </select>
                                            <button
                                                onClick={() => {
                                                    const entity = prompt("Enter new entity name:");
                                                    if (entity && entity.trim()) {
                                                        setEntities([...entities, entity.trim()]);
                                                    }
                                                }}
                                                class="px-3 py-2 text-white rounded-lg font-bold"
                                                style={{backgroundColor: '#778fef'}}
                                                onMouseEnter={(e) => e.target.style.backgroundColor = '#6278d4'}
                                                onMouseLeave={(e) => e.target.style.backgroundColor = '#778fef'}
                                            >
                                                ➕
                                            </button>
                                        </div>
                                        <input
                                            type="date"
                                            value={newTask.dueDate}
                                            onChange={(e) => setNewTask({...newTask, dueDate: e.target.value})}
                                            class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <select
                                            value={newTask.priority}
                                            onChange={(e) => setNewTask({...newTask, priority: e.target.value})}
                                            class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option>Low</option>
                                            <option>Medium</option>
                                            <option>High</option>
                                        </select>
                                    </div>

                                    <div class="mb-6">
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">Notes (optional)</label>
                                        <div class="space-y-2 mb-2">
                                            {newTask.notes.map((note, idx) => (
                                                <div key={idx} class="flex gap-2 text-sm">
                                                    <span class="flex-1 px-3 py-1 bg-gray-100 rounded">{note}</span>
                                                    <button onClick={() => setNewTask({...newTask, notes: newTask.notes.filter((_, i) => i !== idx)})} class="text-red-500 hover:text-red-700 font-bold">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                        <div class="flex gap-2">
                                            <input
                                                type="text"
                                                placeholder="Add a note..."
                                                id="newNoteInput"
                                                class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                                                onKeyPress={(e) => {
                                                    if (e.key === 'Enter') {
                                                        const input = e.target;
                                                        if (input.value.trim()) {
                                                            setNewTask({...newTask, notes: [...newTask.notes, input.value]});
                                                            input.value = '';
                                                        }
                                                    }
                                                }}
                                            />
                                            <button
                                                onClick={(e) => {
                                                    const input = document.getElementById('newNoteInput');
                                                    if (input.value.trim()) {
                                                        setNewTask({...newTask, notes: [...newTask.notes, input.value]});
                                                        input.value = '';
                                                    }
                                                }}
                                                class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg text-sm"
                                            >
                                                ➕ Add
                                            </button>
                                        </div>
                                    </div>

                                    <div class="flex gap-3 mt-8">
                                        <button
                                            onClick={addTask}
                                            class="flex-1 text-white font-semibold py-2 px-4 rounded transition shadow-md"
                                            style={{backgroundColor: '#708fec'}}
                                            onMouseEnter={(e) => e.target.style.backgroundColor = '#6278d4'}
                                            onMouseLeave={(e) => e.target.style.backgroundColor = '#708fec'}
                                        >
                                            Create Task
                                        </button>
                                        <button
                                            onClick={() => { setShowAddModal(false); setNewTask({ name: "", entity: "", status: "Pending", dueDate: "", priority: "Medium", notes: [] }); }}
                                            class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-700 font-semibold py-2 px-4 rounded transition border border-gray-600"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}


                        {/* Tasks Table */}
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
                            <table class="w-full text-sm" style={{tableLayout: 'fixed'}}>
                                <colgroup>
                                    <col style={{width: '32px'}} />
                                    <col style={{width: 'auto'}} />
                                    <col style={{width: '128px'}} />
                                    <col style={{width: '128px'}} />
                                    <col style={{width: '128px'}} />
                                    <col style={{width: '128px'}} />
                                    <col style={{width: '48px'}} />
                                </colgroup>
                                <thead class="text-white border-b border-gray-300" style={{backgroundColor: '#708fec'}}>
                                    <tr>
                                        <th class="px-3 py-2 text-left font-semibold"></th>
                                        <th class="px-3 py-2 text-left font-semibold cursor-pointer hover:opacity-80" onClick={() => handleHeaderClick("name")}>Task Name</th>
                                        <th class="px-3 py-2 text-left font-semibold cursor-pointer hover:opacity-80" onClick={() => handleHeaderClick("entity")}>Entity</th>
                                        <th class="px-3 py-2 text-left font-semibold cursor-pointer hover:opacity-80" onClick={() => handleHeaderClick("status")}>Status</th>
                                        <th class="px-3 py-2 text-left font-semibold cursor-pointer hover:opacity-80" onClick={() => handleHeaderClick("dueDate")}>Due Date</th>
                                        <th class="px-3 py-2 text-left font-semibold cursor-pointer hover:opacity-80" onClick={() => handleHeaderClick("priority")}>Priority</th>
                                        <th class="px-3 py-2 text-center font-semibold">Del.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredTasks.length === 0 ? (
                                        <tr>
                                            <td colSpan="7" class="px-3 py-6 text-center text-gray-500">
                                                No tasks found. Add one to get started! 🚀
                                            </td>
                                        </tr>
                                    ) : (
                                        filteredTasks.map(task => (
                                            <React.Fragment key={task.id}>
                                                <tr class={`task-row border-b border-gray-200 ${getPriorityBgClass(task.priority)}`}>
                                                    <td class="px-3 py-1 text-center">
                                                        <button onClick={() => setExpandedId(expandedId === task.id ? null : task.id)} class="text-blue-600 hover:text-blue-800 font-bold text-lg">
                                                            {expandedId === task.id ? "−" : "+"}
                                                        </button>
                                                    </td>
                                                    <td class="px-3 py-1 text-gray-800 font-medium truncate">{task.name}</td>
                                                    <td class="px-3 py-1 cursor-pointer hover:opacity-80 transition" onClick={() => { setEditingCell(`${task.id}-entity`); setEditingValue(task.entity); }}>
                                                        {editingCell === `${task.id}-entity` ? (
                                                            <select
                                                                autoFocus
                                                                value={editingValue}
                                                                onChange={(e) => { updateTaskField(task.id, 'entity', e.target.value); }}
                                                                onBlur={() => { updateTaskField(task.id, 'entity', editingValue); }}
                                                                class="px-2 py-1 rounded text-xs font-semibold text-gray-700 bg-gray-100 w-full border border-blue-400"
                                                            >
                                                                <option value="">-</option>
                                                                {entities.map(ent => <option key={ent} value={ent}>{ent}</option>)}
                                                            </select>
                                                        ) : (
                                                            <span class="inline-block px-2 py-1 rounded text-xs font-semibold" style={{color: '#3498DB'}}>{task.entity || "-"}</span>
                                                        )}
                                                    </td>
                                                    <td class="px-3 py-1 cursor-pointer hover:opacity-80 transition" onClick={() => { updateTaskField(task.id, 'status', task.status === 'Pending' ? 'Complete' : 'Pending'); }}>
                                                        <span class="inline-block px-2 py-1 rounded text-xs font-semibold" style={{color: task.status === 'Pending' ? '#991B1B' : '#166534'}}>{task.status}</span>
                                                    </td>
                                                    <td class="px-3 py-1 cursor-pointer hover:opacity-80 transition" onClick={() => { setEditingCell(`${task.id}-date`); setEditingValue(task.dueDate); }}>
                                                        {editingCell === `${task.id}-date` ? (
                                                            <input
                                                                type="date"
                                                                autoFocus
                                                                value={editingValue}
                                                                onChange={(e) => { updateTaskField(task.id, 'dueDate', e.target.value); }}
                                                                onBlur={() => { updateTaskField(task.id, 'dueDate', editingValue); }}
                                                                class="px-2 py-1 rounded text-xs border border-blue-400 w-full"
                                                            />
                                                        ) : (
                                                            <span class="inline-block px-2 py-1 rounded text-xs font-semibold text-gray-700 bg-gray-100">{task.dueDate || "-"}</span>
                                                        )}
                                                    </td>
                                                    <td class="px-3 py-1 cursor-pointer hover:opacity-80 transition" onClick={() => { const priorityCycle = ["Low", "Medium", "High"]; const currentIdx = priorityCycle.indexOf(task.priority); const nextIdx = (currentIdx + 1) % priorityCycle.length; updateTaskField(task.id, 'priority', priorityCycle[nextIdx]); }}>
                                                        <span class={`inline-block px-2 py-1 rounded text-xs font-semibold ${getPriorityClass(task.priority)}`}>{task.priority}</span>
                                                    </td>
                                                    <td class="px-3 py-1 text-center">
                                                        <button onClick={() => deleteTask(task.id)} class="text-red-600 hover:text-red-800 font-bold text-sm">✕</button>
                                                    </td>
                                                </tr>
                                                {expandedId === task.id && (
                                                    <tr class="bg-gray-50 border-b border-gray-200">
                                                        <td colSpan="7" class="px-3 py-3">
                                                            <div class="text-sm pl-8">
                                                                {task.notes.length === 0 ? (
                                                                    <div class="flex gap-2">
                                                                        <span class="italic text-gray-500">No notes</span>
                                                                        <input
                                                                            type="text"
                                                                            placeholder="Add note..."
                                                                            id={`note-input-${task.id}`}
                                                                            class="flex-1 px-2 py-0 border border-gray-300 rounded text-xs focus:outline-none focus:ring-1 focus:ring-blue-400"
                                                                            onKeyPress={(e) => {
                                                                                if (e.key === 'Enter') {
                                                                                    addNote(task.id, e.target.value);
                                                                                    e.target.value = '';
                                                                                }
                                                                            }}
                                                                        />
                                                                        <button
                                                                            onClick={() => {
                                                                                const input = document.getElementById(`note-input-${task.id}`);
                                                                                addNote(task.id, input.value);
                                                                                input.value = '';
                                                                            }}
                                                                            class="text-green-600 hover:text-green-800 font-bold"
                                                                        >
                                                                            ➕
                                                                        </button>
                                                                    </div>
                                                                ) : (
                                                                    <div class="space-y-1">
                                                                        {task.notes.map((note, idx) => (
                                                                            <div key={idx} class="flex gap-2 items-center group">
                                                                                {editingNoteId === `${task.id}-${idx}` ? (
                                                                                    <>
                                                                                        <input
                                                                                            type="text"
                                                                                            value={editingNoteText}
                                                                                            onChange={(e) => setEditingNoteText(e.target.value)}
                                                                                            class="flex-1 px-1 py-0 border border-blue-300 rounded text-xs"
                                                                                            autoFocus
                                                                                        />
                                                                                        <button onClick={() => { editNote(task.id, idx, editingNoteText); setEditingNoteId(null); }} class="text-green-600 hover:text-green-800 font-bold text-xs">✓</button>
                                                                                        <button onClick={() => setEditingNoteId(null)} class="text-gray-600 hover:text-gray-800 font-bold text-xs">✕</button>
                                                                                    </>
                                                                                ) : (
                                                                                    <>
                                                                                        <span class="flex-1 text-gray-700">• {note}</span>
                                                                                        <button onClick={() => { setEditingNoteId(`${task.id}-${idx}`); setEditingNoteText(note); }} class="text-blue-500 hover:text-blue-700 opacity-0 group-hover:opacity-100 font-bold">✎</button>
                                                                                        <button onClick={() => deleteNote(task.id, idx)} class="text-red-500 hover:text-red-700 opacity-0 group-hover:opacity-100 font-bold">✕</button>
                                                                                        {idx === task.notes.length - 1 && (
                                                                                            <button
                                                                                                onClick={() => {
                                                                                                    const newNote = prompt("Add a new note:");
                                                                                                    if (newNote) addNote(task.id, newNote);
                                                                                                }}
                                                                                                class="text-green-600 hover:text-green-800 opacity-0 group-hover:opacity-100 font-bold"
                                                                                            >
                                                                                                ➕
                                                                                            </button>
                                                                                        )}
                                                                                    </>
                                                                                )}
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )}
                                            </React.Fragment>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>

                        {/* Controls - Bottom */}
                        <div class="mt-8 flex gap-2">
                            <button
                                onClick={exportJSON}
                                class="bg-gray-700 hover:bg-gray-600 text-gray-800 font-semibold py-2 px-3 rounded text-xs transition border border-gray-400" style={{backgroundColor: '#f3f4f6'}}
                            >
                                Export JSON
                            </button>
                            <button
                                onClick={exportCSV}
                                class="bg-gray-700 hover:bg-gray-600 text-gray-800 font-semibold py-2 px-3 rounded text-xs transition border border-gray-400" style={{backgroundColor: '#f3f4f6'}}
                            >
                                Export CSV
                            </button>
                            <label class="bg-gray-700 hover:bg-gray-600 text-gray-700 font-semibold py-2 px-3 rounded text-xs cursor-pointer transition border border-gray-600">
                                Import JSON
                                <input type="file" accept=".json" onChange={importJSON} style={{ display: 'none' }} />
                            </label>
                        </div>

                        {/* Footer Info */}
                        <div class="mt-6 bg-blue-50 border border-blue-200 rounded-lg p-6">
                            <h3 class="font-bold text-gray-800 mb-2">How to Use with GitHub</h3>
                            <ul class="text-sm text-gray-700 space-y-1 list-disc list-inside">
                                <li>Export as JSON and commit to GitHub</li>
                                <li>Team members can import the JSON file to sync tasks</li>
                                <li>Whoever pushes last wins (simple merge strategy)</li>
                                <li>Save as bookmark for quick access</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<FinanceTaskTracker />, document.getElementById('app'));
    </script>
</body>
</html>
